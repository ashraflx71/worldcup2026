<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 | AI Premium Hub</title>
    <meta name="theme-color" content="#0a0a0a">
    <meta name="description" content="منصة كأس العالم 2026 الذكية - متابعة حية، توقعات الجماهير، ومولد محتوى السيو الاحترافي.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #050505;
            --bg-card: #111111;
            --neon-green: #39ff14;
            --neon-blue: #00f3ff;
            --gold-royal: #ffd700;
            --text-main: #ffffff;
            --text-dim: #999999;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-deep); color: var(--text-main); padding-bottom: 80px; }
        header { background: linear-gradient(180deg, #111 0%, var(--bg-deep) 100%); padding: 20px 15px; text-align: center; border-bottom: 3px solid var(--gold-royal); box-shadow: 0 4px 20px rgba(255, 215, 0, 0.15); }
        header h1 { font-size: 1.6rem; font-weight: 900; color: var(--gold-royal); text-shadow: 0 0 10px rgba(255, 215, 0, 0.4); }
        header p { font-size: 0.85rem; color: var(--neon-blue); margin-top: 5px; font-weight: bold; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        section { background: var(--bg-card); border: 1px solid #222; border-radius: 16px; padding: 20px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .section-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; color: var(--text-main); border-right: 4px solid var(--neon-green); padding-right: 8px; }
        
        .match-box { background: #161616; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #252525; }
        .match-info { display: flex; justify-content: space-between; align-items: center; text-align: center; }
        .team-name { flex: 1; font-weight: 700; font-size: 0.95rem; }
        .live-score { background: #000; padding: 6px 14px; border-radius: 30px; border: 1px solid var(--neon-green); color: var(--neon-green); font-weight: 900; font-size: 1.2rem; min-width: 80px; }
        .match-status { text-align: center; font-size: 0.75rem; margin-top: 8px; color: var(--neon-blue); display: flex; justify-content: center; align-items: center; gap: 5px; }
        .live-dot { width: 8px; height: 8px; background-color: red; border-radius: 50%; animation: pulse 1.2s infinite; }
        
        .predict-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 15px; }
        .predict-input { width: 50px; padding: 8px; background: #000; border: 1px solid #444; border-radius: 6px; color: #fff; text-align: center; font-size: 1.1rem; font-weight: bold; }
        .form-label { font-size: 0.85rem; color: var(--text-dim); display: block; margin-bottom: 6px; }
        .input-field, select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 0.95rem; margin-bottom: 15px; }
        .btn-action { width: 100%; padding: 14px; background: transparent; border: 2px solid var(--gold-royal); color: var(--gold-royal); font-weight: 700; font-size: 1rem; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .btn-action:active { background: var(--gold-royal); color: #000; box-shadow: 0 0 15px var(--gold-royal); }
        .output-box { background: #090909; border: 1px dashed var(--neon-blue); border-radius: 8px; padding: 15px; margin-top: 15px; display: none; font-size: 0.9rem; white-space: pre-line; max-height: 250px; overflow-y: auto; }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 2px solid var(--neon-blue); display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-item { color: var(--text-dim); font-size: 0.8rem; text-decoration: none; text-align: center; font-weight: bold; }
        .nav-item.active { color: var(--neon-blue); text-shadow: 0 0 5px var(--neon-blue); }
        .update-time { text-align: center; font-size: 0.75rem; color: var(--text-dim); margin-top: 10px; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.4; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <h1>🏆 WORLD CUP 2026</h1>
        <p>⚡ PREMIUM AUTOMATED HUB ⚡</p>
    </header>

    <div class="container">
        <!-- قسم المباريات الحية القادم من السكريبت -->
        <section id="live-section">
            <div class="section-title">⚽ مباريات كأس العالم المباشرة اليوم</div>
            
            <!-- هنا السكريبت سيقوم بوضع المباريات تلقائياً -->
            <!-- DATA_START -->
            <div class="match-box">
                <div class="match-info">
                    <div class="team-name">البرازيل 🇧🇷</div>
                    <div class="live-score">0 - 0</div>
                    <div class="team-name">فرنسا 🇫🇷</div>
                </div>
                <div class="match-status"><div class="live-dot"></div> في انتظار انطلاق البطولة حياً</div>
            </div>
            <!-- DATA_END -->

            <div class="update-time" id="lastUpdate">آخر تحديث تلقائي: <!-- TIME_PLACEHOLDER --> قيد الانتظار... <!-- TIME_PLACEHOLDER --></div>
        </section>

        <!-- مصنع مقالات السيو -->
        <section id="seo-section">
            <div class="section-title">✍️ مصنع مقالات المونديال (SEO Factory)</div>
            <label class="form-label">الحدث الرياضي / عنوان المباراة</label>
            <input type="text" id="matchTitle" class="input-field" placeholder="مثال: قمة البرازيل وفرنسا">
            <label class="form-label">نوع المقال</label>
            <select id="articleType">
                <option value="analysis">تحليل تكتيكي شامل للمباراة</option>
                <option value="news">تغطية خبرية عاجلة وردود أفعال</option>
                <option value="predictions">تقرير التوقعات وفرص الصعود</option>
            </select>
            <button class="btn-action" onclick="generateWorldCupArticle()">⚡ توليد هيكل المقال الحصري فوريًا</button>
            <div class="output-box" id="articleOutput"></div>
        </section>
    </div>

    <div class="nav-bar">
        <a href="#live-section" class="nav-item active">📊 المباريات والتوقعات</a>
        <a href="#seo-section" class="nav-item">🔥 مصنع المحتوى</a>
    </div>

    <script>
        function generateWorldCupArticle() {
            const title = document.getElementById('matchTitle').value;
            const type = document.getElementById('articleType').value;
            const output = document.getElementById('articleOutput');
            if(!title) { alert("برجاء كتابة عنوان المباراة!"); return; }
            output.style.display = "block";
            let intro = `شهدت الساحات الرياضية اهتمامًا ضخمًا بـ تفاصيل مواجهة (${title}) في نهائيات كأس العالم 2026، حيث يبحث المشجعون عن مجريات هذا اللقاء الناري.`;
            let keywords = `الكلمات المفتاحية: كأس العالم 2026، نتيجة مباراة ${title}، ملخص مباراة ${title}، أخبار المونديال.`;
            let bodyText = type === "analysis" ? `📋 التحليل التكتيكي:\n- القراءة الفنية للمباراة وتغييرات المدربين.\n- نقاط القوة والضعف ومفاتيح الحسم.` : type === "news" ? `📰 التغطية العاجلة:\n- رصد صافرة النهاية والأهداف الحارقة.\n- تصريحات اللاعبين وترتيب المجموعة المحدث.` : `🔮 التوقعات وفرص التأهل:\n- قراءة في حسابات التأهل ونسب الفوز بناءً على المعطيات حية.`;
            output.innerText = `✨ عنوان السيو المقترح:\n💥 ${title} المباشر | نتيجة ومجريات اللقاء في كأس العالم 2026\n\n━━━━━━━━━━━━━━━━━━━━\n\n${keywords}\n\n━━━━━━━━━━━━━━━━━━━━\n\n📌 المقدمة:\n${intro}\n\n━━━━━━━━━━━━━━━━━━━━\n\n${bodyText}\n\n💪 انسخ وانشر فوراً في مدونتك لزيادة الأرشفة والزيارات!`;
        }
    </script>
</body>
</html>
