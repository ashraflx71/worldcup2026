<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 | AI Premium Hub</title>
    
    <!-- Meta للـ PWA والسيو الصاروخي -->
    <meta name="theme-color" content="#0a0a0a">
    <meta name="description" content="منصة كأس العالم 2026 الذكية - متابعة حية، توقعات الجماهير، ومولد محتوى السيو الاحترافي.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- الخطوط -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #050505;
            --bg-card: #111111;
            --neon-green: #39ff14;
            --neon-blue: #00f3ff;
            --gold-royal: #ffd700;
            --text-main: #ffffff;
            --text-dim: #999999;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            padding-bottom: 80px;
        }

        /* --- Header --- */
        header {
            background: linear-gradient(180deg, #111 0%, var(--bg-deep) 100%);
            padding: 20px 15px;
            text-align: center;
            border-bottom: 3px solid var(--gold-royal);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.15);
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--gold-royal);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }

        header p {
            font-size: 0.85rem;
            color: var(--neon-blue);
            margin-top: 5px;
            font-weight: bold;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 15px;
        }

        /* --- الأقسام --- */
        section {
            background: var(--bg-card);
            border: 1px solid #222;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .section-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
            border-right: 4px solid var(--neon-green);
            padding-right: 8px;
        }

        /* --- قسم المباريات المباشرة --- */
        .match-box {
            background: #161616;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #252525;
            transition: all 0.3s ease;
        }

        .match-box.active {
            border-color: var(--neon-green);
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
        }

        .match-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: center;
        }

        .team-name {
            flex: 1;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .live-score {
            background: #000;
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            font-weight: 900;
            font-size: 1.2rem;
            min-width: 80px;
        }

        .match-status {
            text-align: center;
            font-size: 0.75rem;
            margin-top: 8px;
            color: var(--neon-blue);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: red;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }

        /* --- محرك التوقعات --- */
        .predict-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-top: 15px;
        }

        .predict-input {
            width: 50px;
            padding: 8px;
            background: #000;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .predict-input:focus {
            border-color: var(--neon-blue);
            outline: none;
        }

        /* --- مصنع محتوى السيو --- */
        .form-label {
            font-size: 0.85rem;
            color: var(--text-dim);
            display: block;
            margin-bottom: 6px;
        }

        .input-field, select {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .input-field:focus {
            border-color: var(--gold-royal);
            outline: none;
        }

        .btn-action {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 2px solid var(--gold-royal);
            color: var(--gold-royal);
            font-weight: 700;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-action:active {
            background: var(--gold-royal);
            color: #000;
            box-shadow: 0 0 15px var(--gold-royal);
            transform: scale(0.98);
        }

        .output-box {
            background: #090909;
            border: 1px dashed var(--neon-blue);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            display: none;
            font-size: 0.9rem;
            white-space: pre-line;
            max-height: 250px;
            overflow-y: auto;
        }

        /* --- شريط التحديث الحي --- */
        .update-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            background: rgba(57, 255, 20, 0.1);
            border: 1px solid var(--neon-green);
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--neon-green);
            margin-bottom: 15px;
        }

        .update-status.updating {
            background: rgba(0, 243, 255, 0.1);
            border-color: var(--neon-blue);
            color: var(--neon-blue);
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--neon-green);
            animation: pulse 1s infinite;
        }

        .update-status.updating .status-indicator {
            background: var(--neon-blue);
        }

        .last-update {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 10px;
        }

        /* --- Navigation Bar --- */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            border-top: 2px solid var(--neon-blue);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 1000;
        }

        .nav-item {
            color: var(--text-dim);
            font-size: 0.8rem;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
        }

        .nav-item.active {
            color: var(--neon-blue);
            text-shadow: 0 0 5px var(--neon-blue);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .match-box-new {
            animation: slideIn 0.5s ease-out;
        }
    </style>
</head>
<body>

    <!-- الهيدر المونديالي -->
    <header>
        <h1>🏆 WORLD CUP 2026</h1>
        <p>⚡ PREMIUM AUTO-UPDATE HUB ⚡</p>
    </header>

    <div class="container">

        <!-- 1. مركز المباريات المباشرة مع التحديث التلقائي -->
        <section id="live-section">
            <div class="section-title">⚽ مباريات كأس العالم المباشرة اليوم</div>
            
            <!-- حالة التحديث -->
            <div class="update-status" id="updateStatus">
                <div class="status-indicator"></div>
                <span id="statusText">جاهز للتحديث التلقائي الفوري...</span>
            </div>

            <!-- منطقة المباريات المباشرة -->
            <div id="matchesContainer">
                <!-- سيتم ملء هذا القسم تلقائياً بواسطة JavaScript -->
                <div class="match-box">
                    <div class="match-info">
                        <div class="team-name">الأرجنتين 🇦🇷</div>
                        <div class="live-score"> VS </div>
                        <div class="team-name">إسبانيا 🇪🇸</div>
                    </div>
                    <div class="match-status">📅 جاري التحميل...</div>
                </div>
            </div>

            <!-- معلومات آخر تحديث -->
            <div class="last-update" id="lastUpdate">آخر تحديث تلقائي: الآن قيد التفعيل...</div>
        </section>

        <!-- 2. مصنع محتوى الـ SEO المؤتمت -->
        <section id="seo-section">
            <div class="section-title">✍️ مصنع مقالات المونديال (SEO Factory)</div>
            
            <label class="form-label">الحدث الرياضي / عنوان المباراة</label>
            <input type="text" id="matchTitle" class="input-field" placeholder="مثال: قمة البرازيل وفرنسا ربع النهائي">

            <label class="form-label">نوع المقال المفضل لعناكب جوجل</label>
            <select id="articleType">
                <option value="analysis">تحليل تكتيكي شامل للمباراة</option>
                <option value="news">تغطية خبرية عاجلة وردود أفعال</option>
                <option value="predictions">تقرير التوقعات وفرص تأهل المنتخبات</option>
            </select>

            <button class="btn-action" onclick="generateWorldCupArticle()">⚡ توليد هيكل المقال الحصري فوريًا</button>

            <!-- صندوق إخراج المقال -->
            <div class="output-box" id="articleOutput"></div>
        </section>

    </div>

    <!-- شريط التنقل السفلي -->
    <div class="nav-bar">
        <a href="#live-section" class="nav-item active">📊 المباريات والتوقعات</a>
        <a href="#seo-section" class="nav-item">🔥 مصنع المحتوى الذكي</a>
    </div>

    <script>
        // ===== نظام التحديث التلقائي الذكي =====
        
        // بيانات المباريات (يمكن استبدالها بـ API حقيقي)
        const matchesData = [
            {
                id: 1,
                team1: "البرازيل",
                flag1: "🇧🇷",
                team2: "فرنسا",
                flag2: "🇫🇷",
                score1: 2,
                score2: 1,
                status: "الشوط الثاني - دقيقة 72'",
                isLive: true,
                updated: new Date()
            },
            {
                id: 2,
                team1: "الأرجنتين",
                flag1: "🇦🇷",
                team2: "إسبانيا",
                flag2: "🇪🇸",
                score1: 0,
                score2: 0,
                status: "الشوط الأول - دقيقة 35'",
                isLive: true,
                updated: new Date()
            },
            {
                id: 3,
                team1: "ألمانيا",
                flag1: "🇩🇪",
                team2: "إنجلترا",
                flag2: "🇬🇧",
                score1: 1,
                score2: 1,
                status: "انتهت المباراة - 90'",
                isLive: false,
                updated: new Date()
            }
        ];

        // دالة عرض المباريات
        function displayMatches() {
            const container = document.getElementById('matchesContainer');
            container.innerHTML = '';

            matchesData.forEach((match, index) => {
                const matchBox = document.createElement('div');
                matchBox.className = 'match-box match-box-new' + (match.isLive ? ' active' : '');
                
                const liveIndicator = match.isLive ? '<div class="live-dot"></div>' : '';
                
                matchBox.innerHTML = `
                    <div class="match-info">
                        <div class="team-name">${match.team1} ${match.flag1}</div>
                        <div class="live-score">${match.score1} - ${match.score2}</div>
                        <div class="team-name">${match.team2} ${match.flag2}</div>
                    </div>
                    <div class="match-status">
                        ${match.isLive ? liveIndicator : ''}
                        ${match.status}
                    </div>
                    <div class="predict-row">
                        <span style="font-size: 0.85rem; color: var(--text-dim);">توقعك المباشر:</span>
                        <div>
                            <input type="number" class="predict-input" placeholder="0" min="0">
                            <span style="color:var(--gold-royal)">-</span>
                            <input type="number" class="predict-input" placeholder="0" min="0">
                        </div>
                        <button class="btn-action" style="padding: 5px 12px; width: auto; font-size: 0.8rem;" onclick="checkPrediction(${match.id})">تأكيد التوقع</button>
                    </div>
                `;
                
                container.appendChild(matchBox);
            });
        }

        // دالة تحديث آخر وقت تحديث
        function updateLastUpdateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('ar-EG', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('lastUpdate').textContent = `آخر تحديث تلقائي: ${timeString}`;
        }

        // دالة محاكاة التحديث التلقائي
        function autoUpdateMatches() {
            const statusDiv = document.getElementById('updateStatus');
            const statusText = document.getElementById('statusText');
            
            // إظهار حالة التحديث
            statusDiv.classList.add('updating');
            statusText.textContent = 'جاري التحديث التلقائي...';

            // محاكاة تأخير الاتصال بـ API
            setTimeout(() => {
                // تحديث النتائج بشكل عشوائي لمحاكاة البث المباشر
                matchesData.forEach(match => {
                    if (match.isLive) {
                        // تحديث الدقيقة
                        const minutes = parseInt(match.status.match(/\d+/)[0]);
                        if (minutes < 90) {
                            const newMinutes = Math.min(minutes + Math.floor(Math.random() * 2), 90);
                            match.status = match.status.replace(/\d+/, newMinutes);
                        }
                        
                        // احتمال هدف جديد (نادر)
                        if (Math.random() < 0.1) {
                            match.score1 += Math.random() > 0.5 ? 1 : 0;
                            match.score2 += Math.random() > 0.5 ? 1 : 0;
                        }
                    }
                });

                // عرض المباريات المحدثة
                displayMatches();
                updateLastUpdateTime();

                // العودة لحالة الانتظار
                statusDiv.classList.remove('updating');
                statusText.textContent = '✅ تم التحديث بنجاح | التحديث القادم خلال ثواٍ...';

                setTimeout(() => {
                    if (statusText.textContent.includes('تم التحديث')) {
                        statusText.textContent = 'جاهز للتحديث التلقائي الفوري...';
                    }
                }, 3000);
            }, 1000);
        }

        // دالة التحقق من التوقعات
        function checkPrediction(matchId) {
            const p1Input = event.target.parentElement.querySelector('.predict-input:first-of-type');
            const p2Input = event.target.parentElement.querySelector('.predict-input:last-of-type');
            
            const p1 = p1Input.value;
            const p2 = p2Input.value;

            if(p1 === "" || p2 === "") {
                alert("برجاء إدخال أرقام التوقع أولاً يا هندسة!");
                return;
            }

            alert(`🔥 تم تسجيل توقعك بنجاح [${p1} - ${p2}]!\n\nإذا صحت النتيجة ستحصل على 50 نقطة في لوحة الصدارة.`);
            
            // مسح الحقول بعد التأكيد
            p1Input.value = '';
            p2Input.value = '';
        }

        // دالة توليد مقالات المونديال
        function generateWorldCupArticle() {
            const title = document.getElementById('matchTitle').value;
            const type = document.getElementById('articleType').value;
            const output = document.getElementById('articleOutput');

            if(!title) {
                alert("برجاء كتابة عنوان أو اسم المباراة أولاً!");
                return;
            }

            output.style.display = "block";
            
            let intro = `شهدت الساحات الرياضية العالمية اهتمامًا ضخمًا بـ طيات مواجهة (${title}) في نهائيات كأس العالم 2026، حيث يبحث الملايين من عشاق كرة القدم عن تفاصيل هذا اللقاء الناري.`;
            let keywords = `الكلمات المفتاحية المستهدفة: كأس العالم 2026، بث مباشر ${title}، تحليل مباراة ${title}، ترتيب مجموعات كأس العالم.`;
            
            let bodyText = "";
            if(type === "analysis") {
                bodyText = `📋 الهيكل التحليلي الموصى به لجوجل:\n- مقدمة قوية تجذب القارئ في أول 3 ثوانٍ.\n- ��لفقرة الأولى: القراءة الفنية للمدربين ونقاط القوة والضعف.\n- الفقرة الثانية: مفاتيح اللعب الإستراتيجية التي حسمت اللقاء.\n- الخاتمة: السيناريوهات المتوقعة للمنتخبات في الدور القادم.`;
            } else if(type === "news") {
                bodyText = `📰 التغطية الخبرية العاجلة:\n- رصد فوري لصافرة النهاية وأبرز اللقطات المثيرة للجدل.\n- تصريحات مدربي المنتخبات واللاعبين في المنطقة المختلطة.\n- تحديث فوري لجدول ترتيب المجموعة ونسب الصعود الحالية.`;
            } else {
                bodyText = `🔮 تقرير التوقعات والذكاء الاصطناعي:\n- استعراض تاريخ المواجهات المباشرة بين الطرفين لتعزيز جودة المقال.\n- نسب الفوز بناءً على معطيات الأداء الحالية ونقاط القوة.\n- تصويت الجماهير وتوقعات خبراء الكورة الإلكترونية والواقعية.`;
            }

            output.innerText = `✨ عنوان المقال المقترح لـ Google SEO:\n💥 ${title} اليوم | التحليل الشامل والترتيب المباشر في كأس العالم 2026\n\n━━━━━━━━━━━━━━━━━━━━\n\n${keywords}\n\n━━━━━━━━━━━━━━━━━━━━\n\n📌 المقدمة الحصرية:\n${intro}\n\n━━━━━━━━━━━━━━━━━━━━\n\n${bodyText}\n\n💪 نصيحة الخبير: انسخ هذا الهيكل، أضف طابعك التحليلي الخاص في دقيقتين، وانشره فورًا ليقفز بك لعناكب البحث الصدارة!`;
        }

        // تفعيل التنقل
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', function() {
                navItems.forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // ===== تهيئة التطبيق =====
        document.addEventListener('DOMContentLoaded', function() {
            // عرض المباريات الأولية
            displayMatches();
            updateLastUpdateTime();

            // تحديث تلقائي كل 10 ثوانٍ
            setInterval(autoUpdateMatches, 10000);

            // تحديث أول مرة بعد 3 ثوانٍ
            setTimeout(autoUpdateMatches, 3000);
        });
    </script>
</body>
</html>
