<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 | AI Premium Hub</title>
    
    <!-- Meta لتهيئة الـ PWA والسيو الصاروخي -->
    <meta name="theme-color" content="#0a0a0a">
    <meta name="description" content="منصة كأس العالم 2026 الذكية - متابعة حية، توقعات الجماهير، ومولد محتوى السيو الاحترافي.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- الخطوط -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #050505;
            --bg-card: #111111;
            --neon-green: #39ff14;
            --neon-blue: #00f3ff;
            --gold-royal: #ffd700;
            --text-main: #ffffff;
            --text-dim: #999999;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            padding-bottom: 80px;
        }

        /* --- Header --- */
        header {
            background: linear-gradient(180deg, #111 0%, var(--bg-deep) 100%);
            padding: 20px 15px;
            text-align: center;
            border-bottom: 3px solid var(--gold-royal);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.15);
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--gold-royal);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }

        header p {
            font-size: 0.85rem;
            color: var(--neon-blue);
            margin-top: 5px;
            font-weight: bold;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 15px;
        }

        /* --- الأقسام --- */
        section {
            background: var(--bg-card);
            border: 1px solid #222;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .section-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
            border-right: 4px solid var(--neon-green);
            padding-right: 8px;
        }

        /* --- 1. قسم المباريات الحية --- */
        .match-box {
            background: #161616;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #252525;
        }

        .match-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: center;
        }

        .team-name {
            flex: 1;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .live-score {
            background: #000;
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            font-weight: 900;
            font-size: 1.2rem;
            min-width: 80px;
        }

        .match-status {
            text-align: center;
            font-size: 0.75rem;
            margin-top: 8px;
            color: var(--neon-blue);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: red;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }

        /* --- 2. محرك التوقعات المباشر --- */
        .predict-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-top: 15px;
        }

        .predict-input {
            width: 50px;
            padding: 8px;
            background: #000;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .predict-input:focus {
            border-color: var(--neon-blue);
            outline: none;
        }

        /* --- 3. مصنع محتوى السيو (SEO Factory) --- */
        .form-label {
            font-size: 0.85rem;
            color: var(--text-dim);
            display: block;
            margin-bottom: 6px;
        }

        .input-field, select {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .input-field:focus {
            border-color: var(--gold-royal);
            outline: none;
        }

        .btn-action {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 2px solid var(--gold-royal);
            color: var(--gold-royal);
            font-weight: 700;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-action:active {
            background: var(--gold-royal);
            color: #000;
            box-shadow: 0 0 15px var(--gold-royal);
            transform: scale(0.98);
        }

        .output-box {
            background: #090909;
            border: 1px dashed var(--neon-blue);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            display: none;
            font-size: 0.9rem;
            white-space: pre-line;
            max-height: 250px;
            overflow-y: auto;
        }

        /* --- Navigation Bar للهواتف (التصفح بيد واحدة) --- */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            border-top: 2px solid var(--neon-blue);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 1000;
        }

        .nav-item {
            color: var(--text-dim);
            font-size: 0.8rem;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
        }

        .nav-item.active {
            color: var(--neon-blue);
            text-shadow: 0 0 5px var(--neon-blue);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- الهيدر المونديالي المضيء -->
    <header>
        <h1>🏆 WORLD CUP 2026</h1>
        <p>⚡ PREMIUM AI WORKSTATION ⚡</p>
    </header>

    <div class="container">

        <!-- 1. مركز المباريات المباشرة وتوقع النتيجة -->
        <section id="live-section">
            <div class="section-title">⚽ تحديثات حية ومباشرة</div>
            
            <div class="match-box">
                <div class="match-info">
                    <div class="team-name">البرازيل 🇧🇷</div>
                    <div class="live-score" id="score1">2 - 1</div>
                    <div class="team-name">فرنسا 🇫🇷</div>
                </div>
                <div class="match-status">
                    <div class="live-dot"></div> الشوط الثاني - دقيقة 72'
                </div>

                <!-- محرك التوقعات الفوري مدمج أسفل المباراة -->
                <div class="predict-row">
                    <span style="font-size: 0.85rem; color: var(--text-dim);">توقعك المباشر:</span>
                    <div>
                        <input type="number" class="predict-input" id="p1" placeholder="0">
                        <span style="color:var(--gold-royal)">-</span>
                        <input type="number" class="predict-input" id="p2" placeholder="0">
                    </div>
                    <button class="btn-action" style="padding: 5px 12px; width: auto; font-size: 0.8rem;" onclick="checkPrediction()">تأكيد التوقع</button>
                </div>
            </div>
        </section>

        <!-- 2. مصنع محتوى الـ SEO المؤتمت للمقالات -->
        <section id="seo-section">
            <div class="section-title">✍️ مصنع مقالات المونديال (SEO Factory)</div>
            
            <label class="form-label">الحدث الرياضي / عنوان المباراة</label>
            <input type="text" id="matchTitle" class="input-field" placeholder="مثال: قمة البرازيل وفرنسا ربع النهائي">

            <label class="form-label">نوع المقال المفضل لعناكب جوجل</label>
            <select id="articleType">
                <option value="analysis">تحليل تكتيكي شامل للمباراة</option>
                <option value="news">تغطية خبرية عاجلة وردود أفعال</option>
                <option value="predictions">تقرير التوقعات وفرص تأهل المنتخبات</option>
            </select>

            <button class="btn-action" onclick="generateWorldCupArticle()">⚡ توليد هيكل المقال الحصري فوريًا</button>

            <!-- صندوق إخراج المقال الجاهز للنسخ -->
            <div class="output-box" id="articleOutput"></div>
        </section>

    </div>

    <!-- بار التنقل السفلي المريح للتحكم بالكامل من الموبايل -->
    <div class="nav-bar">
        <a href="#live-section" class="nav-item active">📊 المباريات والتوقعات</a>
        <a href="#seo-section" class="nav-item">🔥 مصنع المحتوى الذكي</a>
    </div>

    <script>
        // دالة محاكاة التوقعات المباشرة وتفاعل الواجهة
        function checkPrediction() {
            const p1 = document.getElementById('p1').value;
            const p2 = document.getElementById('p2').value;
            if(p1 === "" || p2 === "") {
                alert("برجاء إدخال أرقام التوقع أولاً يا هندسة!");
                return;
            }
            alert(`🔥 تم تسجيل توقعك بنجاح [${p1} - ${p2}]! إذا صحت النتيجة ستحصل على 50 نقطة في لوحة الصدارة.`);
        }

        // دالة توليد مقالات المونديال المتوافقة مع الـ SEO لمنع الـ Low Value Content
        function generateWorldCupArticle() {
            const title = document.getElementById('matchTitle').value;
            const type = document.getElementById('articleType').value;
            const output = document.getElementById('articleOutput');

            if(!title) {
                alert("برجاء كتابة عنوان أو اسم المباراة أولاً!");
                return;
            }

            output.style.display = "block";
            
            let intro = `شهدت الساحات الرياضية العالمية اهتمامًا ضخمًا بـ طيات مواجهة (${title}) في نهائيات كأس العالم 2026، حيث يبحث الملايين من عشاق كرة القدم عن تفاصيل هذا اللقاء الناري.`;
            let keywords = `الكلمات المفتاحية المستهدفة: كأس العالم 2026، بث مباشر ${title}، تحليل مباراة ${title}، ترتيب مجموعات كأس العالم.`;
            
            let bodyText = "";
            if(type === "analysis") {
                bodyText = `📋 الهيكل التحليلي الموصى به لجوجل:\n- مقدمة قوية تجذب القارئ في أول 3 ثوانٍ.\n- الفقرة الأولى: القراءة الفنية للمدربين ونقاط القوة والضعف.\n- الفقرة الثانية: مفاتيح اللعب الإستراتيجية التي حسمت اللقاء.\n- الخاتمة: السيناريوهات المتوقعة للمنتخبات في الدور القادم.`;
            } else if(type === "news") {
                bodyText = `📰 التغطية الخبرية العاجلة:\n- رصد فوري لصافرة النهاية وأبرز اللقطات المثيرة للجدل.\n- تصريحات مدربي المنتخبات واللاعبين في المنطقة المختلطة.\n- تحديث فوري لجدول ترتيب المجموعة ونسب الصعود الحالية.`;
            } else {
                bodyText = `🔮 تقرير التوقعات والذكاء الاصطناعي:\n- استعراض تاريخ المواجهات المباشرة بين الطرفين لتعزيز جودة المقال.\n- نسب الفوز بناءً على معطيات الأداء الحالية ونقاط القوة.\n- تصويت الجماهير وتوقعات خبراء الكورة الإلكترونية والواقعية.`;
            }

            output.innerText = `✨ عنوان المقال المقترح لـ Google SEO:\n💥 ${title} اليوم | التحليل الشامل والترتيب المباشر في كأس العالم 2026\n\n━━━━━━━━━━━━━━━━━━━━\n\n${keywords}\n\n━━━━━━━━━━━━━━━━━━━━\n\n📌 المقدمة الحصرية:\n${intro}\n\n━━━━━━━━━━━━━━━━━━━━\n\n${bodyText}\n\n💪 نصيحة الخبير: انسخ هذا الهيكل، أضف طابعك التحليلي الخاص في دقيقتين، وانشره فورًا في لتقفز لعناكب البحث الصدارة!`;
        }

        // تفعيل حركة التنقل السلس والتبديل البسيط
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', function() {
                navItems.forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
