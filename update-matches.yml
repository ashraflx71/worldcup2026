name: تحديث المباريات تلقائياً

on:
  schedule:
    - cron: '*/10 * * * *'  # كل 10 دقائق
  workflow_dispatch:  # للتشغيل اليدوي

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: إعداد Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: تثبيت المكتبات
        run: |
          pip install requests
      
      - name: تشغيل سكريبت التحديث
        env:
          LIVE_KEY: ${{ secrets.LIVE_KEY }}
        run: python update_matches.py
      
      - name: حفظ التغييرات
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "تحديث تلقائي للمباريات"
          git push
